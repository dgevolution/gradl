name: Build PortSwigger Tool

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          repository: PortSwigger/web-cache-deception-scanner

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: |
          # Install Maven
          sudo apt-get update > /dev/null 2>&1
          sudo apt-get install -y maven > /dev/null 2>&1
          
          # Compile the tool
          mvn clean package -DskipTests
          
          # Find the compiled .jar file
          JAR_FILE=$(find target -name "*.jar" ! -name "*sources*" | head -n 1)
          
          # Rename it
          cp "$JAR_FILE" web-cache-deception-scanner.jar

      - name: Send to Telegram
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F chat_id="${TELEGRAM_CHAT_ID}" \
            -F document="@web-cache-deception-scanner.jar" \
            -F caption="📦 PortSwigger Scanner Compiled!" || true
