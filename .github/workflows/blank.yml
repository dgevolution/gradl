name: Build PortSwigger Tool

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Clone, Build, and Send
        run: |
          # 1. Force download the PortSwigger repo into a folder called 'tool'
          git clone https://github.com/PortSwigger/web-cache-deception-scanner.git tool
          
          # 2. Go inside that folder
          cd tool
          
          # 3. Install Maven
          sudo apt-get update > /dev/null 2>&1
          sudo apt-get install -y maven > /dev/null 2>&1
          
          # 4. Compile the tool
          mvn clean package -DskipTests
          
          # 5. Find the compiled .jar file
          JAR_FILE=$(find target -name "*.jar" ! -name "*sources*" | head -n 1)
          
          # 6. Move it out of the folder so we can send it
          cp "$JAR_FILE" ../web-cache-deception-scanner.jar
          
          # 7. Send to Telegram
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F chat_id="${TELEGRAM_CHAT_ID}" \
            -F document="@../web-cache-deception-scanner.jar" \
            -F caption="📦 PortSwigger Scanner Compiled Successfully!" || true
